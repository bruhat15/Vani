    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem("vani-theme");
          var theme = storedTheme === "light" || storedTheme === "dark" ? storedTheme : "dark";

          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (_error) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
